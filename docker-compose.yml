services:
  stroom-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: stroom-api
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:8100:8000"
    volumes:
      - ./media:/app/media:rw
      - ./models:/app/models:ro
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ASYNC_DATABASE_URL=${ASYNC_DATABASE_URL}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - LITELLM_URL=${LITELLM_URL}
      - TZ=Europe/Amsterdam
    networks:
      - stroom-backend
      - personal_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
          pids: 200
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      stroom-db:
        condition: service_healthy
      stroom-litellm:
        condition: service_healthy

  stroom-db:
    image: pgvector/pgvector:pg16
    container_name: stroom-db
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: stroom
      POSTGRES_USER: stroom
      POSTGRES_PASSWORD: ${STROOM_DB_PASSWORD}
      TZ: Europe/Amsterdam
    volumes:
      - stroom-pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - stroom-backend
      - personal_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stroom -d stroom"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
          pids: 200
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: stroom-litellm
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      TZ: Europe/Amsterdam
    networks:
      - stroom-backend
      - personal_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:4000/health/liveliness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
          pids: 200
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  stroom-media:
    image: nginx:alpine
    container_name: stroom-media
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./media:/usr/share/nginx/html:ro
    ports:
      - "127.0.0.1:8090:80"
    networks:
      - stroom-backend
      - personal_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost/"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.5'
          pids: 50
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  stroom-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: stroom-web
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./web:/app
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8100
      - TZ=Europe/Amsterdam
    networks:
      - stroom-backend
      - personal_net
    depends_on:
      stroom-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
          pids: 200
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  stroom-pgdata:

networks:
  stroom-backend:
    internal: true
  personal_net:
    external: true
