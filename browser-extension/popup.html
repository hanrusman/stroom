<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stroom inbox</title>
  <style>
    :root {
      --bg: #faf7f0;
      --fg: #1a1a1a;
      --muted: #6b6b6b;
      --border: #d8d2c4;
      --accent: #16335b;
      --accent-fg: #ffffff;
      --ok: #1f7a44;
      --err: #b00020;
    }
    * { box-sizing: border-box; }
    body {
      width: 380px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      font-size: 14px;
    }
    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 20px;
      margin: 0 0 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 .sub { font-family: inherit; font-size: 13px; font-weight: normal; color: var(--muted); }
    label { display: block; font-weight: 600; margin: 12px 0 4px; }
    .hint { color: var(--muted); font-size: 12px; margin-top: 3px; }
    input, select, textarea {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--fg);
      font-size: 14px;
      font-family: inherit;
    }
    textarea { resize: vertical; min-height: 54px; }
    .row { display: flex; gap: 10px; }
    .row > div { flex: 1; min-width: 0; }
    .url {
      font-size: 12px;
      color: var(--muted);
      word-break: break-all;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      margin-top: 4px;
    }
    .actions { margin-top: 18px; display: flex; justify-content: flex-end; gap: 10px; }
    button {
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      border: 1px solid transparent;
    }
    button.primary { background: var(--accent); color: var(--accent-fg); }
    button.primary:disabled { opacity: 0.55; cursor: default; }
    button.ghost { background: transparent; color: var(--muted); border-color: var(--border); }
    #status { margin-top: 12px; font-size: 13px; min-height: 18px; }
    #status.ok { color: var(--ok); }
    #status.err { color: var(--err); }
    .loading { color: var(--muted); font-style: italic; }
    .hidden { display: none; }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <h1>📥 Stroom <span class="sub">— naar inbox</span></h1>

  <div id="loading" class="loading">Pagina ophalen…</div>

  <form id="form" class="hidden">
    <div class="url" id="urlDisplay"></div>

    <label for="title">Titel</label>
    <input type="text" id="title" placeholder="Titel van het item" />

    <div class="row">
      <div>
        <label for="format">Type</label>
        <select id="format">
          <option value="article">📄 Artikel</option>
          <option value="podcast">🎧 Podcast</option>
          <option value="video">📺 Video</option>
        </select>
      </div>
      <div>
        <label for="topic">Topic</label>
        <select id="topic"></select>
      </div>
    </div>

    <label for="author">Auteur <span class="hint" style="display:inline">(optioneel)</span></label>
    <input type="text" id="author" placeholder="Naam van de auteur" />

    <label for="description">Beschrijving <span class="hint" style="display:inline">(optioneel)</span></label>
    <textarea id="description" placeholder="Korte beschrijving…"></textarea>

    <div id="status"></div>

    <div class="actions">
      <button type="button" class="ghost" id="cancel">Annuleren</button>
      <button type="submit" class="primary" id="submit">Toevoegen aan inbox</button>
    </div>
  </form>

  <div id="fatal" class="hidden"></div>

  <script src="popup.js"></script>
</body>
</html>
